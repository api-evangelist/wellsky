aid: wellsky
name: WellSky
description: WellSky provides care coordination and home health software with REST APIs for managing patient referrals, authorizations, visit scheduling, clinical documentation, and billing workflows across home health, hospice, palliative care, personal care, and specialty pharmacy settings.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/wellsky/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
type: Index
tags:
  - Healthcare
  - Home Health
  - Hospice
  - Care Coordination
  - FHIR
  - Clinical Documentation
  - Billing
  - EHR
apis:
  - aid: wellsky:caretend-api
    name: WellSky CareTend API
    description: Integration hub API for WellSky's CareTend home infusion and specialty pharmacy platform, providing programmatic access to patient management, billing authorizations, clinical visits, inventory, purchase orders, and document workflows.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://caretendapi.readme.io/
    baseURL: https://api.wellsky.com
    tags:
      - Home Infusion
      - Specialty Pharmacy
      - Patient Management
      - Billing
      - Inventory
    properties:
      - type: Documentation
        url: https://caretendapi.readme.io/
      - type: Authentication
        url: https://caretendapi.readme.io/docs/getting-started
    contact:
      - FN: WellSky Support
        url: https://wellsky.com/support/

  - aid: wellsky:fhir-api
    name: WellSky FHIR API
    description: FHIR R4-compliant API built on the US Core Implementation Guide, providing read access to patient health data including demographics, conditions, medications, lab results, care plans, and clinical documents for ConnectEHR interoperability.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://wellsky.dynamicfhir.com/wellsky/basepractice/r4/Home/ApiDocumentation
    baseURL: https://wellsky.dynamicfhir.com/fhir/wellsky/basepractice/r4
    tags:
      - FHIR
      - EHR
      - Interoperability
      - USCDI
      - Clinical Data
    properties:
      - type: Documentation
        url: https://wellsky.dynamicfhir.com/wellsky/basepractice/r4/Home/ApiDocumentation
    contact:
      - FN: WellSky Support
        url: https://wellsky.com/support/

  - aid: wellsky:hospice-palliative-api
    name: WellSky Hospice and Palliative API
    description: FHIR R4 interoperability API for EHR partners integrating with WellSky's Consolo hospice and palliative care platform, supporting patient demographics, care plans, medication requests, observations, encounters, and CEHRT data-blocking compliance requirements.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://mediwareinc.github.io/consolo.interop-api-docs/
    baseURL: https://mediwareinc.github.io/consolo.interop-api-docs/
    tags:
      - Hospice
      - Palliative Care
      - FHIR
      - EHR Integration
      - CEHRT
    properties:
      - type: Documentation
        url: https://mediwareinc.github.io/consolo.interop-api-docs/
    contact:
      - FN: WellSky Consolo Support
        email: consolo.support@wellsky.com

  - aid: wellsky:personal-care-connect-api
    name: WellSky Personal Care Connect API
    description: FHIR-compliant API for WellSky Personal Care software platform enabling data integration and interoperability for home care agencies, built on OAuth 2.0 client credentials flow for scheduling, care worker management, and visit data.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://apidocs.clearcareonline.com/
    baseURL: https://apidocs.clearcareonline.com/
    tags:
      - Personal Care
      - Home Care
      - Scheduling
      - FHIR
    properties:
      - type: Documentation
        url: https://apidocs.clearcareonline.com/
      - type: TermsOfService
        url: https://wellsky.com/clearcare-connect-api-terms/
    contact:
      - FN: WellSky Support
        url: https://wellsky.com/support/

